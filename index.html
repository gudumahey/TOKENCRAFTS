<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKENCRAFTS | ULTIMATE EXPERIENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --panel-bg: rgba(13, 12, 24, 0.4);
            --border-glow: rgba(139, 92, 246, 0.3);
            --primary: #8b5cf6; /* Cyber Purple */
            --secondary: #ec4899; /* Neon Pink */
            --accent: #00f5ff; /* Cyan Glitch */
            --text-main: #f3f4f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Moving Background Grid Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 8, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 999;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoPulse 3s infinite alternate;
        }

        nav .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav .nav-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(45px, 8vw, 100px);
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #fff 20%, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.4));
            animation: float 5s ease-in-out infinite;
        }

        .hero p {
            font-size: clamp(16px, 3vw, 22px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
